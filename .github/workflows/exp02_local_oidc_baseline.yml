name: exp02_local_oidc_baseline

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Probe OIDC claims from a local trusted step
        shell: bash
        run: |
          chmod +x scripts/print_claims.sh
          ./scripts/print_claims.sh

      - name: Optionally verify benign AWS role assumption
        if: ${{ vars.AWS_ROLE_ARN != '' }}
        shell: bash
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          python -m pip install --quiet boto3
          chmod +x scripts/check_cloud_identity.sh
          ./scripts/check_cloud_identity.sh
