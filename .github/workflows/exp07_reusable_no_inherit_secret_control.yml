name: exp07_reusable_no_inherit_secret_control

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  local_secret_baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Local step checks both secrets
        shell: bash
        env:
          CANARY_SECRET: ${{ secrets.CANARY_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -n "${CANARY_SECRET:-}" ]]; then
            echo "[local-step] canary secret is present"
            echo "[local-step] canary length=${#CANARY_SECRET}"
          else
            echo "[local-step] canary secret is not present"
          fi
          if [[ -n "${OPENAI_API_KEY:-}" ]]; then
            echo "[local-step] llm token secret is present"
            echo "[local-step] llm token length=${#OPENAI_API_KEY}"
          else
            echo "[local-step] llm token secret is not present"
          fi

  reusable_secret_control_without_inherit:
    uses: GWdepend/untrusted-reusable-workflow/.github/workflows/reusable_secret_probe.yml@main
