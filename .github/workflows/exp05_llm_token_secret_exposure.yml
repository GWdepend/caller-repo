name: exp05_llm_token_secret_exposure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  local_llm_token_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Local step checks whether llm token secret is present
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -n "${OPENAI_API_KEY:-}" ]]; then
            echo "[local-step] llm token secret is present"
            echo "[local-step] llm token length=${#OPENAI_API_KEY}"
          else
            echo "[local-step] llm token secret is not present"
          fi

      - name: Run cross-owner action secret probe with llm token
        uses: GWdepend/untrusted-action@main
        with:
          mode: secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  reusable_llm_token_check:
    uses: GWdepend/untrusted-reusable-workflow/.github/workflows/reusable_secret_probe.yml@main
    secrets: inherit
