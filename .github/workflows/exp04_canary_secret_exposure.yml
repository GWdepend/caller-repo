name: exp04_canary_secret_exposure

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  local_canary_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out caller repository
        uses: actions/checkout@v4

      - name: Local step checks whether canary secret is present
        shell: bash
        env:
          CANARY_SECRET: ${{ secrets.CANARY_SECRET }}
        run: |
          if [[ -n "${CANARY_SECRET:-}" ]]; then
            echo "[local-step] canary secret is present"
            echo "[local-step] canary length=${#CANARY_SECRET}"
          else
            echo "[local-step] canary secret is not present"
          fi

      - name: Run cross-owner action secret probe
        uses: GWdepend/untrusted-action@main
        with:
          mode: secret
        env:
          CANARY_SECRET: ${{ secrets.CANARY_SECRET }}

  reusable_canary_check:
    uses: GWdepend/untrusted-reusable-workflow/.github/workflows/reusable_secret_probe.yml@main
    secrets: inherit
